<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>五运六气 · 中医大数据模型推演</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f3 0%, #d9e2e8 100%);
            font-family: 'Segoe UI', 'Noto Sans CJK SC', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            color: #1e2f3a;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部 & 年份控件 */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 500;
            background: linear-gradient(135deg, #2c5a3e, #1f3e2c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #4f6f5f;
            font-size: 0.95rem;
            border-bottom: 1px solid #bdd3c4;
            display: inline-block;
            padding-bottom: 6px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 0.8rem 1.8rem;
            display: inline-flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(100, 120, 100, 0.2);
        }

        .year-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: inset 0 1px 2px #0001, 0 2px 4px #0001;
        }

        .year-selector label {
            font-weight: 600;
            color: #2c5a3e;
        }

        #yearInput {
            font-size: 1.2rem;
            width: 100px;
            padding: 6px 10px;
            border: 1px solid #bfd7cb;
            border-radius: 32px;
            text-align: center;
            font-weight: 500;
            background: #fefef7;
            transition: 0.2s;
        }

        #yearInput:focus {
            outline: none;
            border-color: #3f8a62;
            box-shadow: 0 0 0 2px rgba(63, 138, 98, 0.2);
        }

        button {
            background: #2c5a3e;
            border: none;
            padding: 8px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button:hover {
            background: #1f462f;
            transform: translateY(-1px);
        }

        /* 当前季节卡片 */
        .current-season-card {
            background: linear-gradient(120deg, #e7f0ea, #d7e6de);
            border-radius: 32px;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            border-left: 8px solid #c59a6b;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.08);
        }

        .season-badge {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .qi-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3d2a1c;
        }

        .qi-date {
            font-size: 1rem;
            background: #fef5e6;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            color: #8b5a2b;
        }

        .season-desc {
            font-size: 1rem;
            line-height: 1.5;
            color: #2e3f35;
            margin-top: 0.5rem;
            background: rgba(255,255,240,0.7);
            padding: 0.8rem 1.2rem;
            border-radius: 24px;
        }

        /* 整体布局网格 */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 250, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 1.4rem 1.8rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2ecdc;
            transition: all 0.2s;
        }

        .card h2 {
            font-size: 1.6rem;
            font-weight: 500;
            border-left: 5px solid #c59a6b;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
            color: #2c5a3e;
        }

        .yun-table, .qi-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .yun-table th, .yun-table td,
        .qi-table th, .qi-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #dde6df;
            text-align: left;
            vertical-align: top;
        }

        .yun-table th {
            font-weight: 700;
            width: 30%;
            color: #4a6b58;
        }

        .badge {
            background: #e9f0e6;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
            margin-right: 8px;
        }

        .emphasis {
            color: #b45f2b;
            font-weight: 700;
        }

        .gzh-text {
            line-height: 1.5;
            background: #faf6e9;
            padding: 0.8rem;
            border-radius: 20px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #6c8b7a;
        }

        @media (max-width: 800px) {
            .grid-2col {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .control-panel {
                flex-direction: column;
                border-radius: 32px;
                padding: 1rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌾 五运六气 · 灵枢推演</h1>
        <div class="sub">基于天干地支 | 大数据中医运气模型</div>
        <div class="control-panel">
            <div class="year-selector">
                <label>📅 选择年份</label>
                <input type="number" id="yearInput" value="2024" min="1900" max="2100" step="1">
            </div>
            <button id="generateBtn">⚡ 推演运气格局</button>
        </div>
    </div>

    <!-- 当前季节快讯 -->
    <div class="current-season-card" id="currentSeasonCard">
        <div class="season-badge">
            <span class="qi-name" id="currentQiName">—</span>
            <span class="qi-date" id="currentQiPeriod">—</span>
        </div>
        <div class="season-desc" id="currentQiDesc">
            加载中...
        </div>
    </div>

    <!-- 五运 & 六气 双栏 -->
    <div class="grid-2col">
        <!-- 五运板块 -->
        <div class="card">
            <h2>🔄 五运格局</h2>
            <div id="yunContent">计算中...</div>
        </div>
        <!-- 六气板块 -->
        <div class="card">
            <h2>🌈 六气演绎</h2>
            <div id="qiContent">计算中...</div>
        </div>
    </div>

    <!-- 全年整体运气评述 -->
    <div class="card" style="margin-bottom: 1rem;">
        <h2>📜 岁运总论 & 气候疾病倾向</h2>
        <div id="summaryText" class="gzh-text">——</div>
    </div>
    <footer>⚕️ 依据《黄帝内经》五运六气学说，结合天干化运、地支化气模型推演。仅供参考，养生治未病需结合实际情况。</footer>
</div>

<script>
    // ========================= 核心推算库 =========================
    // 天干地支映射 (公历年份直接干支，-4法)
    const GAN = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const ZHI = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];

    function getGanZhi(year) {
        const offset = year - 4;
        const ganIndex = offset % 10;
        const zhiIndex = offset % 12;
        return { gan: GAN[ganIndex < 0 ? ganIndex + 10 : ganIndex], zhi: ZHI[zhiIndex < 0 ? zhiIndex + 12 : zhiIndex], ganIdx: ganIndex, zhiIdx: zhiIndex };
    }

    // 天干化中运 (岁运)
    const GAN_YUN = {
        "甲": { wuxing: "土", tbg: "太过", yin: "太宫", desc: "土运太过，湿气流行，雨湿时降，肾水受邪，易病腹痛、四肢沉重" },
        "乙": { wuxing: "金", tbg: "不及", yin: "少商", desc: "金运不及，燥气不足，火气乘之，咳喘、肺燥，易发上呼吸道疾患" },
        "丙": { wuxing: "水", tbg: "太过", yin: "太羽", desc: "水运太过，寒气流行，心火受邪，易患心痛、寒厥、水肿" },
        "丁": { wuxing: "木", tbg: "不及", yin: "少角", desc: "木运不及，风气弱，燥金来克，胁痛、筋急，易抑郁" },
        "戊": { wuxing: "火", tbg: "太过", yin: "太徵", desc: "火运太过，暑热流行，肺金受邪，咳喘、血溢，心烦失眠" },
        "己": { wuxing: "土", tbg: "不及", yin: "少宫", desc: "土运不及，风木乘之，飧泄、食少，脾胃虚弱" },
        "庚": { wuxing: "金", tbg: "太过", yin: "太商", desc: "金运太过，燥气盛行，肝木受邪，胁痛、目赤，皮肤干燥" },
        "辛": { wuxing: "水", tbg: "不及", yin: "少羽", desc: "水运不及，湿土乘之，腰背酸重，肾虚水肿" },
        "壬": { wuxing: "木", tbg: "太过", yin: "太角", desc: "木运太过，风气流行，脾土受邪，腹痛肠鸣，头晕目眩" },
        "癸": { wuxing: "火", tbg: "不及", yin: "少徵", desc: "火运不及，寒水乘之，胸痹、心悸，阳气不足" }
    };

    // 地支化气 (司天)
    const ZHI_SITIAN = {
        "子": "少阴君火", "午": "少阴君火",
        "丑": "太阴湿土", "未": "太阴湿土",
        "寅": "少阳相火", "申": "少阳相火",
        "卯": "阳明燥金", "酉": "阳明燥金",
        "辰": "太阳寒水", "戌": "太阳寒水",
        "巳": "厥阴风木", "亥": "厥阴风木"
    };
    // 在泉 对应司天 (相对)
    const SITIAN_ZAIQUAN = {
        "少阴君火": "阳明燥金",
        "太阴湿土": "太阳寒水",
        "少阳相火": "厥阴风木",
        "阳明燥金": "少阴君火",
        "太阳寒水": "太阴湿土",
        "厥阴风木": "少阳相火"
    };

    // 客气顺序 (从司天第三气开始排六步)
    const LIUQI_ORDER = ["厥阴风木", "少阴君火", "少阳相火", "太阴湿土", "阳明燥金", "太阳寒水"];
    function getKeqiOrder(sitian) {
        // sitian 是客气第三气, 找出索引然后重新排序
        let startIdx = LIUQI_ORDER.indexOf(sitian);
        if (startIdx === -1) startIdx = 0;
        let order = [];
        for (let i = 0; i < 6; i++) {
            order.push(LIUQI_ORDER[(startIdx + i) % 6]);
        }
        return order; // [初气,二气,三气(司天),四气,五气,终气(在泉)]
    }

    // 主气固定顺序与节气时段 (农历节气大约日期)
    const ZHUQI_LIST = [
        { name: "厥阴风木", period: "大寒 → 春分 (约1.20-3.20)", climate: "风气当令，阳气升发，多风善变" },
        { name: "少阴君火", period: "春分 → 小满 (约3.21-5.20)", climate: "热气初荣，火气渐旺，温病易发" },
        { name: "少阳相火", period: "小满 → 大暑 (约5.21-7.22)", climate: "暑热炽盛，火气旺盛，易伤津耗气" },
        { name: "太阴湿土", period: "大暑 → 秋分 (约7.23-9.22)", climate: "湿热交蒸，雨湿流行，脾困身重" },
        { name: "阳明燥金", period: "秋分 → 小雪 (约9.23-11.21)", climate: "燥气肃杀，凉燥伤肺，皮肤干燥" },
        { name: "太阳寒水", period: "小雪 → 大寒 (约11.22-1.19)", climate: "寒气凛冽，阳气潜藏，关节痛痹" }
    ];

    // 根据当前日期判断主气索引(0~5)
    function getCurrentZhuqiIndex() {
        const now = new Date();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const dateNum = month * 100 + day;
        // 近似节气划分
        if ((month === 1 && day >= 20) || (month === 2 && day <= 28) || (month === 3 && day <= 20)) return 0;      // 大寒-春分
        if ((month === 3 && day >= 21) || (month === 4 && day <= 30) || (month === 5 && day <= 20)) return 1;    // 春分-小满
        if ((month === 5 && day >= 21) || (month === 6 && day <= 30) || (month === 7 && day <= 22)) return 2;    // 小满-大暑
        if ((month === 7 && day >= 23) || (month === 8 && day <= 31) || (month === 9 && day <= 22)) return 3;    // 大暑-秋分
        if ((month === 9 && day >= 23) || (month === 10 && day <= 31) || (month === 11 && day <= 21)) return 4;  // 秋分-小雪
        return 5; // 小雪-大寒
    }

    // 客运太少相生 (五音建运: 角徵宫商羽 对应 木火土金水)
    // 中运的太过不及决定客运初运，再太少交替
    const YIN_MAP = { "太角": "木太过", "少角": "木不及", "太徵": "火太过", "少徵": "火不及", "太宫": "土太过", "少宫": "土不及", "太商": "金太过", "少商": "金不及", "太羽": "水太过", "少羽": "水不及" };
    // 五音对应五行
    const YIN_WUXING = { "角": "木", "徵": "火", "宫": "土", "商": "金", "羽": "水" };
    // 客运推算: 传入中运五音 (太少+音) 返回五步客运数组 [{yin, wuxing, desc}]
    function getKeyunList(zhongyunYin) {
        // 五音顺序: 角→徵→宫→商→羽
        const order = ["角", "徵", "宫", "商", "羽"];
        // 当前中运是 太/少 + 音
        let firstTaiShao = zhongyunYin[0]; // "太" 或 "少"
        let firstYin = zhongyunYin[1];     // 角徵宫商羽
        let startIdx = order.indexOf(firstYin);
        let result = [];
        let currentTaiShao = firstTaiShao;
        for (let i = 0; i < 5; i++) {
            let idx = (startIdx + i) % 5;
            let yinChar = order[idx];
            let wuxing = YIN_WUXING[yinChar];
            let yinName = currentTaiShao + yinChar;
            let tbgDesc = currentTaiShao === "太" ? "太过" : "不及";
            result.push({
                step: i+1,
                yinName: yinName,
                wuxing: wuxing,
                tbg: tbgDesc,
                desc: `${wuxing}运${tbgDesc}，影响相应脏腑`
            });
            // 交替太少
            currentTaiShao = (currentTaiShao === "太") ? "少" : "太";
        }
        return result;
    }

    // 生成整年五运六气数据模型
    function getYearlyYunQi(year) {
        const { gan, zhi, ganIdx, zhiIdx } = getGanZhi(year);
        const yunData = GAN_YUN[gan];
        if (!yunData) return null;
        const zhongyun = { wuxing: yunData.wuxing, tbg: yunData.tbg, yin: yunData.yin, descBase: yunData.desc };
        // 客运列表
        const keyunList = getKeyunList(zhongyun.yin);
        // 主运固定 (仅展示五行)
        const zhuyunList = [
            { step: 1, wuxing: "木", name: "初运木", period: "大寒→春分(73天)" },
            { step: 2, wuxing: "火", name: "二运火", period: "春分→小满(73天)" },
            { step: 3, wuxing: "土", name: "三运土", period: "小满→大暑(73天)" },
            { step: 4, wuxing: "金", name: "四运金", period: "大暑→秋分(73天)" },
            { step: 5, wuxing: "水", name: "终运水", period: "秋分→小雪(73天)" }
        ];

        // 六气
        const sitian = ZHI_SITIAN[zhi];
        const zaiquan = SITIAN_ZAIQUAN[sitian];
        const keOrder = getKeqiOrder(sitian);
        // 构建客气列表 (六气)
        const liuqiDetails = [];
        for (let i = 0; i < 6; i++) {
            const zhu = ZHUQI_LIST[i];
            const keqi = keOrder[i];
            let position = "";
            if (i === 2) position = "司天 (三之气)";
            else if (i === 5) position = "在泉 (终之气)";
            else position = `${i+1}之气`;
            liuqiDetails.push({
                order: i+1,
                name: zhu.name,
                period: zhu.period,
                zhuqiClimate: zhu.climate,
                keqi: keqi,
                position: position,
            });
        }

        return {
            year, ganzhi: gan+zhi, gan, zhi,
            zhongyun,
            zhuyunList,
            keyunList,
            sitian, zaiquan,
            liuqiDetails,
            keOrder
        };
    }

    // 生成综合评述 (岁运+司天在泉+气候影响)
    function getSummary(data) {
        const zhong = data.zhongyun;
        const sitian = data.sitian;
        const zaiquan = data.zaiquan;
        let text = `【${data.ganzhi}年】岁运为「${zhong.wuxing}运${zhong.tbg}」, ${zhong.descBase}。`;
        text += ` 司天之气「${sitian}」，在泉之气「${zaiquan}」。`;
        if (sitian.includes("寒水") && zhong.wuxing === "火" && zhong.tbg === "太过") text += " 水火相争，寒热交替剧烈，注意心脑血管疾病。";
        else if (sitian.includes("湿土") && zhong.wuxing === "土") text += " 湿土同气，雨湿偏盛，易发脾胃病及水肿。";
        else if (sitian.includes("风木") && zhong.wuxing === "木") text += " 风木重叠，肝气横逆，易眩晕、筋惕肉瞤。";
        else if (sitian.includes("燥金") && zhong.wuxing === "金") text += " 燥金太过，肺气壅滞，咳喘、便秘常见。";
        else text += " 运气相合，气候波动较大，需注意疏调气机，扶正祛邪。";
        text += ` 全年养生大法：根据${zhong.wuxing}运${zhong.tbg}与六气胜复，调理${zhong.wuxing}系统，兼顾所克脏腑。`;
        return text;
    }

    // 当前季节 (根据今天日期所在主气，结合客气描述)
    function getCurrentSeasonDesc(data) {
        if (!data) return "无法获取当前运气数据";
        const idx = getCurrentZhuqiIndex();
        const currentQi = data.liuqiDetails[idx];
        if (!currentQi) return "节气边界外";
        const keqi = currentQi.keqi;
        const zhuName = currentQi.name;
        const period = currentQi.period;
        const zhongyun = data.zhongyun;
        let extra = `当前主气「${zhuName}」, 客气为「${keqi}」。`;
        if (keqi === "厥阴风木" && zhuName === "厥阴风木") extra += " 风木双至，善行数变，易头目胀痛，肝风内动。";
        else if (keqi === "少阴君火" && (zhuName === "少阳相火" || zhuName === "少阴君火")) extra += " 火气叠加，温热病高发，清心泻火为要。";
        else if (keqi === "太阳寒水" && zhuName === "太阳寒水") extra += " 寒水太过，损伤阳气，注意关节保暖，温肾助阳。";
        else extra += ` 岁运${zhongyun.wuxing}${zhongyun.tbg}，客气与主气相参，气候多变，宜调和营卫。`;
        return { name: `「${zhuName}」兼客气「${keqi}」`, period, desc: extra };
    }

    // 渲染五运板块
    function renderYun(data) {
        if (!data) return "<div>推算失败</div>";
        let html = `<table class="yun-table">
            <tr><th>🎯 中运 (岁运)</th><td><span class="badge">${data.zhongyun.wuxing}运 ${data.zhongyun.tbg}</span> ${data.zhongyun.descBase}</td></tr>
            <tr><th>📌 主运 (五步)</th><td>`;
        data.zhuyunList.forEach(y => {
            html += `<div><strong>${y.name}</strong> · ${y.wuxing}行 · ${y.period}</div>`;
        });
        html += `</td></tr><tr><th>✈️ 客运 (太少相生)</th><td>`;
        data.keyunList.forEach(k => {
            html += `<div><strong>${k.step}运 ${k.yinName}</strong> (${k.wuxing}运${k.tbg})</div>`;
        });
        html += `</td></tr></table><div class="gzh-text" style="margin-top:12px">💡 客运反映每年五季的异常气候叠加，结合主运判断疾病传变。</div>`;
        return html;
    }

    // 渲染六气表格
    function renderQi(data) {
        if (!data) return "<div>数据异常</div>";
        let html = `<table class="qi-table">
            <thead><tr><th>六气</th><th>时段</th><th>主气</th><th>客气</th><th>气候特点</th></tr></thead><tbody>`;
        data.liuqiDetails.forEach(q => {
            html += `<tr>
                <td><strong>${q.order}</strong> (${q.position})</td>
                <td>${q.period}</td>
                <td>${q.name}</td>
                <td><span class="badge">${q.keqi}</span></td>
                <td>${q.zhuqiClimate}</td>
            </tr>`;
        });
        html += `</tbody></table><div class="gzh-text" style="margin-top:12px">🌟 司天之气影响上半年，在泉之气主导下半年，客气加临主气决定当下气化特征。</div>`;
        return html;
    }

    // 主渲染函数
    function refreshForYear(year) {
        const data = getYearlyYunQi(year);
        if (!data) {
            document.getElementById("yunContent").innerHTML = "<div>年份超出范围或干支错误</div>";
            return;
        }
        // 更新五运六气区域
        document.getElementById("yunContent").innerHTML = renderYun(data);
        document.getElementById("qiContent").innerHTML = renderQi(data);
        document.getElementById("summaryText").innerHTML = getSummary(data);
        
        // 更新当前季节卡片
        const season = getCurrentSeasonDesc(data);
        document.getElementById("currentQiName").innerHTML = season.name;
        document.getElementById("currentQiPeriod").innerHTML = season.period;
        document.getElementById("currentQiDesc").innerHTML = season.desc + ` 当前岁运: ${data.zhongyun.wuxing}运${data.zhongyun.tbg}，司天${data.sitian}，在泉${data.zaiquan}，请根据运气调摄。`;
    }

    // 监听年份变化
    let currentYear = new Date().getFullYear();
    const yearInput = document.getElementById("yearInput");
    const generateBtn = document.getElementById("generateBtn");

    function init() {
        // 默认本年
        const nowYear = new Date().getFullYear();
        yearInput.value = nowYear;
        refreshForYear(nowYear);
        generateBtn.addEventListener("click", () => {
            let y = parseInt(yearInput.value);
            if (isNaN(y)) y = nowYear;
            if (y < 1900) y = 1900;
            if (y > 2100) y = 2100;
            yearInput.value = y;
            refreshForYear(y);
        });
        // 可选: 年份键盘支持
        yearInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") generateBtn.click();
        });
    }
    init();
</script>
</body>
</html>
