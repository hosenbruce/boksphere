        2029: [
            ["小寒", "2029-01-05 06:56:48", "腊月廿一"], ["大寒", "2029-01-20 00:21:18", "腊月初六"],

            ["立秋", "2029-08-07 13:26:01", "六月廿八"], ["处暑", "2029-08-23 04:04:44", "七月十四"],
            ["白露", "2029-09-07 16:27:29", "七月廿九"], ["秋分", "2029-09-23 01:54:54", "八月十五"],

            ["立冬", "2029-11-07 11:46:13", "十月初二"], ["小雪", "2029-11-22 09:15:31", "十月十七"],
            ["大雪", "2029-12-07 04:38:22", "十一月初二"], ["冬至", "2029-12-21 22:37:49", "十一月十七"],
            ["小寒", "2030-01-05 12:14:08", "腊月初二"]
        ]
    };

    // 节气"节"的集合（月柱切换点）
    const JIE_NAMES = new Set([
        "立春", "惊蛰", "清明", "立夏", "芒种", "小暑",
        "立秋", "白露", "寒露", "立冬", "大雪", "小寒"
    ]);

    // 月支对应农历月名称
    const ZHI_MONTH_MAP = {
        "寅": "正月", "卯": "二月", "辰": "三月", "巳": "四月",
        "午": "五月", "未": "六月", "申": "七月", "酉": "八月",
        "戌": "九月", "亥": "十月", "子": "十一月", "丑": "十二月"
    };
    const ZHI_LIST = ["寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥", "子", "丑"];
    const GAN_LIST = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];

    // 五虎遁：年干 -> 寅月天干索引
    function getYinMonthGanIndex(yearGan) {
        const map = {
            "甲": 2, "乙": 4, "丙": 6, "丁": 8, "戊": 0,
            "己": 2, "庚": 4, "辛": 6, "壬": 8, "癸": 0
        };
        return map[yearGan];
    }

    function getMonthGanZhi(yearGan, zhiIndex) {
        const yinIdx = getYinMonthGanIndex(yearGan);
        const ganIdx = (yinIdx + zhiIndex) % 10;
        return GAN_LIST[ganIdx] + ZHI_LIST[zhiIndex];
    }

    // 年份干支映射（立春为界）
    const YEAR_GANZHI_MAP = {
        2020: { ganZhi: "庚子", gan: "庚" }, 2021: { ganZhi: "辛丑", gan: "辛" },
        2022: { ganZhi: "壬寅", gan: "壬" }, 2023: { ganZhi: "癸卯", gan: "癸" },
        2024: { ganZhi: "甲辰", gan: "甲" }, 2025: { ganZhi: "乙巳", gan: "乙" },
        2026: { ganZhi: "丙午", gan: "丙" }, 2027: { ganZhi: "丁未", gan: "丁" },
        2028: { ganZhi: "戊申", gan: "戊" }, 2029: { ganZhi: "己酉", gan: "己" }
    };
    
    // 前一年干支（用于小寒、大寒）
    const PREV_YEAR_GANZHI = {
        2020: "己亥", 2021: "庚子", 2022: "辛丑", 2023: "壬寅", 2024: "癸卯",
        2025: "甲辰", 2026: "乙巳", 2027: "丙午", 2028: "丁未", 2029: "戊申"
    };

    // 根据年份和节气名称获取年干支（以立春为界）
    function getYearGanZhiForTerm(year, termName) {
        // 小寒、大寒属于前一年节气年
        if (termName === "小寒" || termName === "大寒") {
            return { ganZhi: PREV_YEAR_GANZHI[year], gan: PREV_YEAR_GANZHI[year]?.charAt(0) || "庚" };
        }
        return YEAR_GANZHI_MAP[year] || { ganZhi: "庚子", gan: "庚" };
    }

    // 根据节气名获取地支偏移
    function getZhiIndex(termName) {
        const map = {
            "立春":0, "惊蛰":1, "清明":2, "立夏":3,
            "芒种":4, "小暑":5, "立秋":6, "白露":7,
            "寒露":8, "立冬":9, "大雪":10, "小寒":11
        };
        return map[termName];
    }

    // 生成完整节气列表及月柱
    function buildTableForYear(year) {
        const yearData = SOLAR_TERMS_DATA[year];
        if (!yearData) return [];
        
        const enriched = [];
        let currentMonthGanZhi = null;
        
        for (let i = 0; i < yearData.length; i++) {
            const [termName, dateTimeStr, lunarDisplay] = yearData[i];
            const isJie = JIE_NAMES.has(termName);
            const yearInfo = getYearGanZhiForTerm(year, termName);
            
            let monthGanZhi = null;
            let monthDesc = "";
            
            if (isJie) {
                const zhiIdx = getZhiIndex(termName);
                if (zhiIdx !== undefined) {
                    monthGanZhi = getMonthGanZhi(yearInfo.gan, zhiIdx);
                    currentMonthGanZhi = monthGanZhi;
                    const zhiChar = monthGanZhi[1];
                    const monthName = ZHI_MONTH_MAP[zhiChar] || `${zhiChar}月`;
                    if (termName === "立春") {
                        monthDesc = `🌱 进入${monthName} / ${yearInfo.ganZhi}年起点`;
                    } else {
                        monthDesc = `📅 进入${monthName}`;
                    }
                } else {
                    monthGanZhi = currentMonthGanZhi || "——";
                    monthDesc = "月令起始";
                }
            } else {
                monthGanZhi = currentMonthGanZhi;
                monthDesc = "-";
            }
            
            if (!monthGanZhi) monthGanZhi = "——";
            
            enriched.push({
                termName,
                dateTimeStr,
                lunarDate: lunarDisplay,
                isJie,
                monthGanZhi,
                monthDesc
            });
        }
        return enriched;
    }

    function renderTable(year) {
        const container = document.getElementById('tableContainer');
        if (!container) return;
        const terms = buildTableForYear(year);
        if (!terms.length) {
            container.innerHTML = '<div class="loading">⚠️ 暂无该年份数据</div>';
            return;
        }
        
        let html = `<div class="data-note">📐 时刻精确到秒，依据紫金山天文台《中国天文年历》</div>
        <table>
            <thead>
                <tr><th>节气</th><th>公历时间（东八区）</th><th>农历日期</th><th>干支月柱</th><th>月令变换说明</th> </tr>
            </thead>
            <tbody>`;
        
        for (const t of terms) {
            const rowClass = t.isJie ? 'highlight-row' : '';
            const jieBadge = t.isJie ? '<span class="badge-jie">节</span>' : '';
            const termDisplay = t.termName + jieBadge;
            html += `<tr class="${rowClass}">
                <td style="font-weight:500;">${termDisplay}</td>
                <td>${t.dateTimeStr}</td>
                <td class="lunar-date">${t.lunarDate}</td>
                <td>${t.monthGanZhi}</td>
                <td class="month-desc">${t.monthDesc}</td>
             </tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    // 初始化年份选择器 (2020-2029)
    function initYearSelect() {
        const select = document.getElementById('yearSelect');
        if (!select) return;
        const years = [2020, 2021, 2022, 2023, 2024, 2025, 2026, 2027, 2028, 2029];
        for (const y of years) {
            const option = document.createElement('option');
            option.value = y;
            option.textContent = `${y}年 (${YEAR_GANZHI_MAP[y]?.ganZhi || "——"})`;
            select.appendChild(option);
        }
        select.value = "2026";
        select.addEventListener('change', (e) => {
            renderTable(parseInt(e.target.value));
        });
        renderTable(2026);
    }
    
    initYearSelect();
</script>
